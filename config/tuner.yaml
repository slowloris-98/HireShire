settings:
  resume_tex_path: data/resume_projects/Udayan_Resume.tex         # used by evaluator (Pass 1)
  resume_template_path: data/resume_projects/resume_template.tex  # used by assembler (Pass 2)
  projects_bullets_path: data/resume_projects/projects_bullets.yaml  # pre-authored LaTeX bullets
  projects_path: data/resume_projects/projects.md                 # legacy narrative (no longer used by optimizer)
  tuned_dir: data/tuned          # on-disk home for the assembled resume .tex/.pdf (binaries)
  db_path: data/hireshire.db     # shared SQLite datastore — reads matches, writes the tuned_jobs table

  # Shared fallback model (used when per-pass overrides below are not set)
  model: gpt-4o-mini

  # Per-pass overrides — leave commented out to use LLM_PROVIDER env var + model above.
  evaluator_provider: openai           # cheap/fast model is fine for critique
  evaluator_model: gpt-5-nano
  optimizer_provider: anthropic        # selector/injector: fast API call returning JSON. Choose from: gemini, openai, anthropic, claude_code
  optimizer_model: claude-sonnet-4-6

  max_jd_chars: 12000
  max_tex_chars: 15000
  request_interval_s: 5.0
  claude_cli_timeout_s: 600
