settings:
  concurrency: 10
  request_timeout_s: 30
  retry_attempts: 3
  company_timeout_s: 300  # max seconds to wait for a single company before skipping it
  max_age_hours: 12  # only keep jobs updated in the last N hours; remove this line to fetch all
  location_filter:  # case-insensitive substring match; remove or leave empty to fetch all locations
    - "united states"
    - "remote"
    - "india"

