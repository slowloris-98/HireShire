settings:
  threshold: 80              # min relevance_score (0-100) to shortlist a job
  concurrency: 8             # parallel LLM calls (free tier: keep at 1)
  provider: openai           # gemini / openai / anthropic (omit/null to fall back to LLM_PROVIDER env var)
  model: gpt-5-nano    # model name for the chosen LLM_PROVIDER
  request_interval_s: 2    # seconds to wait between requests (13s = ~4.6 RPM; set to 0 on paid tier)
  max_content_chars: 8000    # truncate job description to this length before sending
  skip_llm: true                   # set true to skip LLM scoring; all title-passing jobs are shortlisted
  resume_path: data/resume_projects/Udayan_Resume.pdf    # path to your resume (relative to project root)
  projects_path: data/resume_projects/projects.md        # optional extra context appended to candidate profile
  db_path: data/hireshire.db  # shared SQLite datastore — reads the scraper's jobs, writes the matches table

title_filter:
  # Title must contain at least one of these (case-insensitive). Leave empty to skip include check.
  include_keywords:
    - engineer
    - developer
    - software
    - backend
    - ml
    - machine learning
    - analyst
    - scientist
    - gtm
    - forward deployed
    - ai
    - artificial intelligence
    - go-to market
    - go to market
    - solution architect
    - genai
    - gen ai
    - applied ai
    - ai engineer
    - swe


  # Title must contain none of these.
  exclude_keywords:
    - principle
    - staff
    - manager
    - vp
    - director
    - principal
    - ios
    - lead
    - android
    - mobile
    - senior
    - fullstack
    - coop
    - co-op
    - Sr.
    - Sr

# Funnel: the relevance gate at the matcher's entry point. Runs the code exclude/
# include filter above, then an encoder (MiniLM) semantic check on the survivors,
# then lazily fetches the description for any surviving list-only Workday/BambooHR
# job (see config/scraper.yaml `scrape_details: false`). Disable to fall back to the
# plain code title filter (only safe when the scraper still fetched descriptions).
funnel:
  enabled: true
  encoder:
    model: sentence-transformers/all-MiniLM-L6-v2   # any sentence-transformers model
    # Semantic anchors for the target job type. Retarget (e.g. ["strategy", "strategist"])
    # to reuse this funnel for a different hunt without touching code.
    targets:
      - software engineer
      - backend engineer
      - machine learning engineer
      - ai engineer
      - ml engineer
      - ml/ai engineer
      - data scientist
      - applied ai
      - full stack developer
      - solutions architect
      - forward deployed engineer
    threshold: 0.35   # min cosine similarity to pass — NEEDS empirical tuning on real titles
  detail_fetch:
    concurrency: 10   # concurrent detail hydrations
    jitter_s: 0.3
    timeout_s: 20
