settings:
  threshold: 60              # min relevance_score (0-100) to shortlist a job
  concurrency: 1             # parallel LLM calls (free tier: keep at 1)
  model: gpt-5-nano    # model name for the chosen LLM_PROVIDER
  request_interval_s: 13    # seconds to wait between requests (13s = ~4.6 RPM; set to 0 on paid tier)
  max_content_chars: 8000    # truncate job description to this length before sending
  resume_path: data/resume_projects/Udayan_Resume.pdf    # path to your resume (relative to project root)
  projects_path: data/resume_projects/projects.md        # optional extra context appended to candidate profile
  runs_dir: data/scraped     # where scraper output lives
  matches_dir: data/matches  # where matcher output will be written

title_filter:
  # Title must contain at least one of these (case-insensitive). Leave empty to skip include check.
  include_keywords:
    - engineer
    - developer
    - software
    - backend
    - fullstack
    - full-stack
    - ml
    - machine learning
    - data
    - analyst
    - scientist
    - gtm
    - forward deployed
    - ai
    - artificial intelligence
    - go-to market
    - go to market
    - solution architect

  # Title must contain none of these.
  exclude_keywords:
    - principle
    - staff
    - manager
    - vp
    - director
    - principal
    - ios
    - lead
